<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #fff;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #666;
        margin: 10px 0 3px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid #ddd;
        border-radius: 7px;
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row > * {
        flex: 1;
      }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 9px;
        border: none;
        border-radius: 8px;
        background: #7c5cff;
        color: #fff;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: #f0f0f3;
        color: #333;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
      }
      details {
        margin-top: 12px;
        font-size: 12px;
      }
      summary {
        cursor: pointer;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>Send to VibeEdit</h1>

    <label for="action">What to do</label>
    <select id="action">
      <option value="recreate">Recreate the style (original)</option>
      <option value="reuse">Reuse the footage (needs rights)</option>
      <option value="save">Just save the clip (needs rights)</option>
    </select>

    <div class="row">
      <div>
        <label for="start">Start (mm:ss)</label>
        <input id="start" placeholder="0:00" />
      </div>
      <div>
        <label for="end">End (mm:ss)</label>
        <input id="end" placeholder="end" />
      </div>
    </div>

    <label id="attestLabel" style="display: none">
      <input type="checkbox" id="attested" style="width: auto" /> I own / licensed this footage
    </label>

    <button id="send">Send current tab</button>
    <div class="status" id="status"></div>

    <details>
      <summary>Connection settings</summary>
      <label for="apiBase">VibeEdit URL</label>
      <input id="apiBase" placeholder="https://vibeedit.video" />
      <label for="token">Connection token</label>
      <input id="token" placeholder="vext_…" />
      <button class="secondary" id="saveConfig">Save settings</button>
    </details>

    <script src="popup.js"></script>
  </body>
</html>
