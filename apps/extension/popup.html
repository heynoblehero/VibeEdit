<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font-family:
          Inter,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        font-size: 13px;
        color: #eeeef2;
        background: #070709;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      h1 .accent {
        color: #d4ff3a;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #8888a0;
        margin: 10px 0 3px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid #1e1e2c;
        border-radius: 7px;
        font-size: 13px;
        background: #12121a;
        color: #eeeef2;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #d4ff3a;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row > * {
        flex: 1;
      }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 9px;
        border: none;
        border-radius: 8px;
        background: #d4ff3a;
        color: #070709;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary {
        background: #1a1a25;
        color: #eeeef2;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
        color: #8888a0;
      }
      .conn {
        margin: 4px 0 8px;
        font-size: 12px;
        font-weight: 600;
        color: #8888a0;
      }
      .conn.ok {
        color: #d4ff3a;
      }
      details {
        margin-top: 12px;
        font-size: 12px;
      }
      summary {
        cursor: pointer;
        color: #8888a0;
      }
    </style>
  </head>
  <body>
    <h1>vibe<span class="accent">edit</span> — send clip</h1>

    <div id="connState" class="conn"></div>
    <button id="getToken" class="secondary">Get a token on VibeEdit →</button>

    <label for="action">What to do</label>
    <select id="action">
      <option value="recreate">Recreate the style (original)</option>
      <option value="reuse">Reuse the footage (needs rights)</option>
      <option value="save">Just save the clip (needs rights)</option>
    </select>

    <div class="row">
      <div>
        <label for="start">Start (mm:ss)</label>
        <input id="start" placeholder="0:00" />
      </div>
      <div>
        <label for="end">End (mm:ss)</label>
        <input id="end" placeholder="end" />
      </div>
    </div>

    <label id="attestLabel" style="display: none">
      <input type="checkbox" id="attested" style="width: auto" /> I own / licensed this footage
    </label>

    <button id="send">Send current tab</button>
    <div class="status" id="status"></div>

    <details>
      <summary>Connection settings</summary>
      <label for="apiBase">VibeEdit URL</label>
      <input id="apiBase" placeholder="https://vibeedit.video" />
      <label for="token">Connection token</label>
      <input id="token" placeholder="vext_…" />
      <button class="secondary" id="saveConfig">Save settings</button>
    </details>

    <script src="popup.js"></script>
  </body>
</html>
