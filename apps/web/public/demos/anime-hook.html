<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#02000e}
#root{width:1080px;height:1920px;position:relative;overflow:hidden}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#1a0030 0%,#02000e 60%);filter:brightness(1.08) contrast(1.2) saturate(1.6)}
.lines{position:absolute;inset:0;overflow:hidden}
.line{position:absolute;background:linear-gradient(90deg,transparent,rgba(255,70,220,0.25),transparent);height:2px;width:200%;left:-50%;transform-origin:center;will-change:transform}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;gap:0}
.ep-tag{font-family:'Inter',sans-serif;font-size:34px;font-weight:900;color:#ff46dc;letter-spacing:6px;text-transform:uppercase;border:3px solid #ff46dc;padding:8px 28px;opacity:0;margin-bottom:48px}
.headline{font-family:'Oswald',sans-serif;font-size:144px;font-weight:700;color:#fff;text-align:center;line-height:0.92;text-transform:uppercase;text-shadow:0 0 40px rgba(255,70,220,0.5),4px 4px 0 #00e5ff,-4px -4px 0 rgba(255,70,220,0.4);opacity:0;will-change:transform}
.sub{font-family:'Inter',sans-serif;font-size:44px;font-weight:900;color:#00e5ff;text-align:center;letter-spacing:2px;margin-top:44px;text-transform:uppercase;opacity:0}
.impact{position:fixed;inset:0;pointer-events:none;z-index:20;opacity:0}
.exclaim{position:absolute;font-family:'Oswald',sans-serif;font-size:600px;font-weight:700;color:rgba(255,70,220,0.04);line-height:1;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;white-space:nowrap}
.grain{position:fixed;inset:0;pointer-events:none;z-index:11;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/><feColorMatrix type=%22saturate%22 values=%220%22/></filter><rect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%220.4%22/></svg>');opacity:0.04;mix-blend-mode:overlay}
.emoji{position:absolute;font-size:120px;opacity:0;top:220px;right:80px}
</style>
</head>
<body>
<div id="root">
  <div class="bg"></div>
  <div class="lines" id="lines">
    <div class="line" style="top:30%;transform:rotate(-12deg)"></div>
    <div class="line" style="top:45%;transform:rotate(-12deg)"></div>
    <div class="line" style="top:60%;transform:rotate(-12deg)"></div>
    <div class="line" style="top:75%;transform:rotate(-12deg)"></div>
  </div>
  <div class="exclaim">!!</div>
  <div class="scene">
    <div class="ep-tag" id="tag">power level: ∞</div>
    <div class="headline" id="h1">THE JUTSU<br>THEY NEVER<br>SHOWED YOU</div>
    <div class="sub" id="sub">⚡ hidden for 20 years ⚡</div>
  </div>
  <div class="emoji" id="em">⚡</div>
  <div class="impact" id="impact" style="background:#ff46dc"></div>
  <div class="grain"></div>
</div>
<script>
const tl = gsap.timeline({onComplete: () => { setTimeout(() => tl.restart(), 400) }});

tl
  .to('.line', { x:'+=800', duration:0.5, ease:'expo.out', stagger:0.08 }, 0)
  .to('#impact', { opacity:0.6, duration:0.05 }, 0.1)
  .to('#impact', { opacity:0, duration:0.2 }, 0.15)
  .to('#tag', { opacity:1, duration:0.01 }, 0.3)
  .from('#tag', { scale:0, rotation:-10, duration:0.4, ease:'back.out(2)' }, 0.3)
  .to('#h1', { opacity:1, duration:0.01 }, 0.7)
  .from('#h1', { scale:0.5, duration:0.4, ease:'back.out(1.7)' }, 0.7)
  .to('#impact', { opacity:0.4, duration:0.04 }, 0.7)
  .to('#impact', { opacity:0, duration:0.15 }, 0.74)
  .to('#sub', { opacity:1, y:0, duration:0.01 }, 1.5)
  .from('#sub', { y:50, duration:0.4, ease:'back.out(1.5)' }, 1.5)
  .to('#em', { opacity:1, scale:1, duration:0.01 }, 1.8)
  .from('#em', { scale:0, rotation:20, duration:0.4, ease:'back.out(2)' }, 1.8)
  .to('#h1', { scale:1.03, duration:0.15, ease:'power2.out', yoyo:true, repeat:1 }, 2.5)
  .to('.line', { x:'-=1600', duration:0.5, ease:'expo.in', stagger:0.06 }, 4.5)
  .to(['#h1','#tag','#sub','#em'], { opacity:0, duration:0.25, stagger:0.04 }, 4.6);
</script>
</body>
</html>
