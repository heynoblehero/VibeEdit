<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#0a0000}
#root{width:1080px;height:1920px;position:relative;overflow:hidden}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,#3d0000 0%,#0a0000 60%)}
.halftone{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,43,58,0.15) 1px,transparent 1px);background-size:28px 28px;opacity:0.6}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px;gap:0}
.fact-badge{font-family:'Bangers',cursive;font-size:60px;color:#ffd166;letter-spacing:6px;background:#ff2b3a;padding:10px 36px;border-radius:4px;opacity:0;margin-bottom:50px;text-shadow:3px 3px 0 rgba(0,0,0,0.5)}
.headline{font-family:'Anton',sans-serif;font-size:152px;font-weight:900;color:#fff;text-align:center;line-height:0.9;text-transform:uppercase;text-shadow:6px 6px 0 #ff2b3a,-2px -2px 0 #ffd166;opacity:0;will-change:transform;letter-spacing:-1px}
.chromatic{position:absolute;font-family:'Anton',sans-serif;font-size:152px;font-weight:900;color:transparent;text-align:center;line-height:0.9;text-transform:uppercase;top:50%;left:50%;transform:translate(-50%,-50%);letter-spacing:-1px;width:100%;padding:0 60px}
.chromatic.r{-webkit-text-stroke:2px #ff2b3a;opacity:0;mix-blend-mode:screen}
.chromatic.b{-webkit-text-stroke:2px #00cfff;opacity:0;mix-blend-mode:screen}
.sub{font-family:'Bangers',cursive;font-size:72px;color:#ffd166;text-align:center;letter-spacing:4px;margin-top:40px;opacity:0}
.num{font-family:'Anton',sans-serif;font-size:320px;color:#ff2b3a;line-height:1;text-shadow:8px 8px 0 #ffd166;opacity:0;margin-bottom:-20px}
.impact{position:fixed;inset:0;background:#ff2b3a;opacity:0;pointer-events:none;z-index:20}
.grain{position:fixed;inset:0;pointer-events:none;z-index:11;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/><feColorMatrix type=%22saturate%22 values=%220%22/></filter><rect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%220.4%22/></svg>');opacity:0.045;mix-blend-mode:overlay}
</style>
</head>
<body>
<div id="root">
  <div class="bg"></div>
  <div class="halftone"></div>
  <div class="scene">
    <div class="fact-badge" id="badge">FACT #47</div>
    <div class="num" id="num">47</div>
    <div class="headline" id="h1">THE VILLAIN<br>WHO BROKE<br>THE RULES</div>
    <div class="sub" id="sub">nobody knew until issue #3</div>
  </div>
  <div class="impact" id="impact"></div>
  <div class="grain"></div>
</div>
<script>
const tl = gsap.timeline({onComplete: () => { setTimeout(() => tl.restart(), 500) }});

tl
  .to('#impact', { opacity:0.7, duration:0.06 }, 0)
  .to('#impact', { opacity:0, duration:0.15 }, 0.06)
  .to('#num', { opacity:1, duration:0.01 }, 0.1)
  .from('#num', { scale:2.5, duration:0.35, ease:'expo.out' }, 0.1)
  .to('#num', { opacity:0, scale:0.6, duration:0.25, ease:'expo.in' }, 0.65)
  .to('#badge', { opacity:1, duration:0.01 }, 0.75)
  .from('#badge', { y:-60, rotation:-8, duration:0.4, ease:'back.out(2)' }, 0.75)
  .to('#h1', { opacity:1, duration:0.01 }, 1.0)
  .from('#h1', { scale:0.55, duration:0.45, ease:'back.out(1.7)' }, 1.0)
  .to('#impact', { opacity:0.5, duration:0.04 }, 1.0)
  .to('#impact', { opacity:0, duration:0.12 }, 1.04)
  .to('#sub', { opacity:1, duration:0.01 }, 1.7)
  .from('#sub', { x:-80, duration:0.4, ease:'expo.out' }, 1.7)
  .to('#h1', { scale:1.03, duration:0.15, ease:'power2.out', yoyo:true, repeat:1 }, 2.8)
  .to('#h1', { opacity:0, y:-30, duration:0.3, ease:'expo.in' }, 4.8)
  .to(['#badge','#sub'], { opacity:0, duration:0.2, stagger:0.05 }, 4.9);
</script>
</body>
</html>
