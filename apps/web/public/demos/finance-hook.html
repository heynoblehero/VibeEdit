<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Anton&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;background:#000}
#root{width:1080px;height:1920px;position:relative;background:radial-gradient(ellipse at 20% 80%,#002b10 0%,#000 65%);font-family:'Anton',sans-serif}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 60px}
.label{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:#00e060;letter-spacing:6px;text-transform:uppercase;opacity:0;margin-bottom:40px}
.headline{font-size:148px;font-weight:900;color:#fff;text-align:center;line-height:0.95;text-transform:uppercase;letter-spacing:-2px;text-shadow:0 0 60px rgba(0,224,96,0.3),0 4px 20px rgba(0,0,0,0.9);opacity:0;will-change:transform}
.stat-wrap{display:flex;flex-direction:column;align-items:center;margin-top:60px;opacity:0}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:220px;font-weight:800;color:#00e060;line-height:1;text-shadow:0 0 80px rgba(0,224,96,0.5);will-change:transform}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:40px;color:rgba(255,255,255,0.5);letter-spacing:4px;margin-top:-10px}
.sub{font-family:'JetBrains Mono',monospace;font-size:44px;color:rgba(255,255,255,0.7);text-align:center;line-height:1.4;margin-top:50px;opacity:0;letter-spacing:1px}
.bar{position:absolute;bottom:0;left:0;right:0;height:6px;background:#00e060;transform-origin:left;transform:scaleX(0)}
.scanlines{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);z-index:10}
.grain{position:fixed;inset:0;pointer-events:none;z-index:11;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/><feColorMatrix type=%22saturate%22 values=%220%22/></filter><rect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%220.4%22/></svg>');opacity:0.04;mix-blend-mode:overlay}
.ticker{position:absolute;bottom:100px;left:0;right:0;display:flex;justify-content:center;gap:60px;font-family:'JetBrains Mono',monospace;font-size:32px;color:rgba(0,224,96,0.6);letter-spacing:2px;opacity:0}
</style>
</head>
<body>
<div id="root">
  <div class="scene">
    <div class="label">breaking</div>
    <div class="headline" id="h1">HOW $47K<br>VANISHED<br>IN 48HRS</div>
    <div class="stat-wrap" id="stat">
      <div class="stat-num" id="counter">0</div>
      <div class="stat-label">dollars / hour</div>
    </div>
    <div class="sub" id="sub">the trade that<br>nobody saw coming</div>
  </div>
  <div class="ticker" id="ticker">▼ NYSE &nbsp;·&nbsp; ▼ CRYPTO &nbsp;·&nbsp; ▲ GOLD &nbsp;·&nbsp; ▼ TECH</div>
  <div class="bar" id="bar"></div>
  <div class="scanlines"></div>
  <div class="grain"></div>
</div>
<script>
const tl = gsap.timeline({onComplete: () => { setTimeout(() => tl.restart(), 400) }});
const counter = document.getElementById('counter');
const obj = { val: 0 };

tl
  .to('#h1', { opacity:1, y:0, duration:0.01 }, 0)
  .from('#h1', { scaleY:1.4, duration:0.55, ease:'expo.out' }, 0.05)
  .from('.label', { y:-30, opacity:0, duration:0.4, ease:'back.out(2)' }, 0.2)
  .to('.label', { opacity:1, duration:0.01 }, 0.2)
  .to('#stat', { opacity:1, duration:0.01 }, 0.7)
  .from('#stat', { scale:0.5, duration:0.45, ease:'back.out(1.7)' }, 0.7)
  .to(obj, {
    val: 979,
    duration: 1.8,
    ease: 'power2.out',
    onUpdate: () => { counter.textContent = Math.round(obj.val).toLocaleString(); }
  }, 0.9)
  .to('#sub', { opacity:1, y:0, duration:0.01 }, 2.0)
  .from('#sub', { y:40, duration:0.5, ease:'expo.out' }, 2.0)
  .to('#ticker', { opacity:1, duration:0.6, ease:'power2.out' }, 2.6)
  .to('#bar', { scaleX:1, duration:5.5, ease:'none' }, 0)
  .to('#stat', { scale:1.04, duration:0.2, ease:'power2.out', yoyo:true, repeat:1 }, 2.8)
  .to('#h1', { opacity:0, y:-20, duration:0.3, ease:'expo.in' }, 5.2)
  .to('#stat', { opacity:0, scale:0.9, duration:0.3, ease:'expo.in' }, 5.3)
  .to('#sub', { opacity:0, y:-15, duration:0.25, ease:'expo.in' }, 5.35)
  .to('.label', { opacity:0, duration:0.2 }, 5.4);
</script>
</body>
</html>
