<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#080400}
#root{width:1920px;height:1080px;position:relative;overflow:hidden}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 75% 30%,#3d2000 0%,#120800 55%,#050200 100%);filter:brightness(0.92) contrast(0.98) saturate(0.72) sepia(0.28)}
.parchment{position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(180,120,40,0.03) 0px,transparent 1px,transparent 40px),repeating-linear-gradient(0deg,rgba(180,120,40,0.03) 0px,transparent 1px,transparent 40px);opacity:0.8}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 140px}
.eyebrow{font-family:'Source Sans 3',sans-serif;font-size:28px;font-weight:600;color:#c8832a;letter-spacing:8px;text-transform:uppercase;opacity:0;margin-bottom:32px}
.headline{font-family:'Libre Baskerville',serif;font-size:112px;font-weight:700;color:#f0ddb0;line-height:1.0;text-shadow:0 4px 40px rgba(0,0,0,0.9);opacity:0;max-width:1100px;will-change:transform}
.divider{width:0;height:3px;background:linear-gradient(90deg,#c8832a,transparent);margin:40px 0;opacity:0}
.body{font-family:'Libre Baskerville',serif;font-style:italic;font-size:46px;color:rgba(240,221,176,0.65);line-height:1.5;max-width:900px;opacity:0}
.year{font-family:'Libre Baskerville',serif;font-size:220px;font-weight:700;color:rgba(200,131,42,0.06);position:absolute;right:100px;bottom:60px;line-height:1;pointer-events:none}
.grain{position:fixed;inset:0;pointer-events:none;z-index:11;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/><feColorMatrix type=%22saturate%22 values=%220%22/></filter><rect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%220.4%22/></svg>');opacity:0.055;mix-blend-mode:overlay}
.vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 45%,rgba(0,0,0,0.7) 100%)}
</style>
</head>
<body>
<div id="root">
  <div class="bg" id="bg"></div>
  <div class="parchment"></div>
  <div class="year">2600 BC</div>
  <div class="scene">
    <div class="eyebrow" id="eye">the official record is wrong</div>
    <div class="headline" id="h1">The pyramid<br>no one is<br>allowed to enter</div>
    <div class="divider" id="div"></div>
    <div class="body" id="body">"Discovered in 1954.<br>Sealed by order of the state.<br>Never explained."</div>
  </div>
  <div class="grain"></div>
  <div class="vignette"></div>
</div>
<script>
const tl = gsap.timeline({onComplete: () => { setTimeout(() => tl.restart(), 600) }});

tl
  .from('#bg', { scale:1.06, duration:8, ease:'none' }, 0)
  .to('#eye', { opacity:1, y:0, duration:0.01 }, 0.3)
  .from('#eye', { x:-40, duration:0.7, ease:'power2.out' }, 0.3)
  .to('#h1', { opacity:1, duration:0.01 }, 0.8)
  .from('#h1', { y:50, duration:0.8, ease:'power4.out' }, 0.8)
  .to('#div', { opacity:1, width:500, duration:0.6, ease:'expo.out' }, 1.8)
  .to('#body', { opacity:1, y:0, duration:0.01 }, 2.6)
  .from('#body', { y:30, duration:0.7, ease:'power2.out' }, 2.6)
  .to('#eye', { opacity:0, duration:0.4, ease:'power2.in' }, 6.5)
  .to('#h1', { opacity:0, y:-20, duration:0.5, ease:'power2.in' }, 6.6)
  .to(['#div','#body'], { opacity:0, duration:0.4 }, 6.7);
</script>
</body>
</html>
