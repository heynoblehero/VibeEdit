<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden;background:#020508}
#root{width:1920px;height:1080px;position:relative;overflow:hidden;font-family:'JetBrains Mono',monospace}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 25% 60%,#00150a 0%,#020508 65%)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,230,80,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,80,0.04) 1px,transparent 1px);background-size:60px 60px}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 160px;gap:0}
.file-tag{font-size:30px;color:rgba(0,230,80,0.5);letter-spacing:4px;text-transform:uppercase;opacity:0;margin-bottom:20px}
.headline{font-size:100px;font-weight:800;color:#00e650;line-height:1.0;text-shadow:0 0 40px rgba(0,230,80,0.3);opacity:0;max-width:1400px;text-transform:uppercase;letter-spacing:-1px}
.terminal{margin-top:60px;opacity:0;max-width:900px}
.t-line{font-size:34px;font-weight:400;color:rgba(0,230,80,0.7);line-height:1.8;opacity:0}
.t-line.dim{color:rgba(0,230,80,0.35)}
.t-line.hi{color:#00e650;font-weight:700}
.cursor{display:inline-block;width:22px;height:40px;background:#00e650;vertical-align:middle;opacity:0;margin-left:4px}
.scanlines{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);z-index:10}
.grain{position:fixed;inset:0;pointer-events:none;z-index:11;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/><feColorMatrix type=%22saturate%22 values=%220%22/></filter><rect width=%22200%22 height=%22200%22 filter=%22url(%23n)%22 opacity=%220.4%22/></svg>');opacity:0.035;mix-blend-mode:overlay}
</style>
</head>
<body>
<div id="root">
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="scene">
    <div class="file-tag" id="ft">// classified · 2024</div>
    <div class="headline" id="h1">THE ALGORITHM<br>THAT BROKE<br>EVERYTHING</div>
    <div class="terminal" id="term">
      <div class="t-line dim" id="t1">&gt; source: unknown</div>
      <div class="t-line" id="t2">&gt; target: global_markets.exe</div>
      <div class="t-line hi" id="t3">&gt; STATUS: <span style="color:#ff4444">CRITICAL</span> — $2.1B lost</div>
      <div class="t-line dim" id="t4">&gt; author: [REDACTED]<span class="cursor" id="cur">█</span></div>
    </div>
  </div>
  <div class="scanlines"></div>
  <div class="grain"></div>
</div>
<script>
const tl = gsap.timeline({onComplete: () => { setTimeout(() => tl.restart(), 700) }});

tl
  .to('#ft', { opacity:1, duration:0.01 }, 0.2)
  .from('#ft', { x:-30, duration:0.4, ease:'expo.out' }, 0.2)
  .to('#h1', { opacity:1, duration:0.01 }, 0.6)
  .from('#h1', { y:40, duration:0.6, ease:'expo.out' }, 0.6)
  .to('#term', { opacity:1, duration:0.01 }, 1.5)
  .to('#t1', { opacity:1, duration:0.3 }, 1.6)
  .to('#t2', { opacity:1, duration:0.3 }, 2.0)
  .to('#t3', { opacity:1, duration:0.3 }, 2.4)
  .to('#t4', { opacity:1, duration:0.3 }, 2.8)
  .to('#cur', { opacity:1, duration:0.01 }, 3.1)
  .to('#cur', { opacity:0, duration:0.4, repeat:4, yoyo:true }, 3.1)
  .to('#h1', { textShadow:'0 0 80px rgba(0,230,80,0.6)', duration:0.2, yoyo:true, repeat:1 }, 3.8)
  .to(['#h1','#ft'], { opacity:0, y:-20, duration:0.4, ease:'expo.in' }, 6.0)
  .to(['#term'], { opacity:0, duration:0.4, ease:'expo.in' }, 6.1);
</script>
</body>
</html>
