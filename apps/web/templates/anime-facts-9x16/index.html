<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1080, height=1920" />
		<title>Anime-style hook</title>
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Oswald:wght@700&display=block"
			rel="stylesheet"
		/>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0a0510; }
			#root {
				position: relative;
				width: 1080px;
				height: 1920px;
				background:
					radial-gradient(
						ellipse at 50% 40%,
						#3a1d5a 0%,
						#1a0a30 50%,
						#05020a 100%
					);
				font-family: "Inter", sans-serif;
				color: #fff;
				overflow: hidden;
			}
			.speed-lines {
				position: absolute;
				inset: 0;
				background:
					repeating-linear-gradient(
						90deg,
						transparent 0,
						transparent 40px,
						rgba(255, 100, 200, 0.06) 40px,
						rgba(255, 100, 200, 0.06) 42px
					);
				transform: skewX(-12deg) scale(1.5);
				pointer-events: none;
			}
			.kicker {
				position: absolute;
				top: 280px;
				left: 50%;
				transform: translateX(-50%) rotate(-3deg);
				font-family: "Oswald", sans-serif;
				font-size: 64px;
				color: #ff64c8;
				letter-spacing: 8px;
				text-transform: uppercase;
				white-space: nowrap;
			}
			.title {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-weight: 900;
				font-size: 280px;
				color: #fff;
				letter-spacing: -4px;
				line-height: 0.9;
				text-align: center;
				text-shadow:
					0 0 28px rgba(255, 100, 200, 0.6),
					-8px 0 0 #ff64c8,
					8px 0 0 #38e1ff;
			}
			.tagline {
				position: absolute;
				bottom: 320px;
				left: 50%;
				transform: translateX(-50%);
				font-family: "Oswald", sans-serif;
				font-size: 60px;
				color: #ffd166;
				letter-spacing: 4px;
				text-transform: uppercase;
				white-space: nowrap;
			}
			.flash {
				position: absolute;
				inset: 0;
				background: #fff;
				opacity: 0;
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div
			id="root"
			data-composition-id="anime-facts"
			data-width="1080"
			data-height="1920"
			data-start="0"
			data-duration="30"
		>
			<div class="speed-lines"></div>
			<div class="kicker" id="kicker">// HOOK NO.07</div>
			<div class="title" id="title">10 ANIME<br/>SECRETS</div>
			<div class="tagline" id="tagline">that broke fans</div>
			<div class="flash" id="flash"></div>
		</div>

		<script>
			window.__timelines = window.__timelines || {};
			const tl = gsap.timeline({ paused: true });
			window.__timelines["anime-facts"] = tl;

			tl.from("#kicker", { x: -200, opacity: 0, duration: 0.4, ease: "power3.out" }, 0)
				.from("#title", { scale: 0.4, opacity: 0, duration: 0.6, ease: "back.out(2)" }, 0.2)
				.to("#flash", { opacity: 0.7, duration: 0.04 }, 0.25)
				.to("#flash", { opacity: 0, duration: 0.18 }, 0.29)
				.from("#tagline", { x: 200, opacity: 0, duration: 0.5 }, 0.8)
				.to("#title", { scale: 1.05, duration: 2, yoyo: true, repeat: 7, ease: "sine.inOut" }, 1.5);
		</script>
	</body>
</html>
