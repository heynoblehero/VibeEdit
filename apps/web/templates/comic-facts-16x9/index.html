<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1920, height=1080" />
		<title>Comic-style hook</title>
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700;900&family=Bangers&display=block"
			rel="stylesheet"
		/>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body {
				width: 1920px;
				height: 1080px;
				background: #0a0a0f;
				overflow: hidden;
				font-family: "Inter", sans-serif;
			}
			#root {
				position: relative;
				width: 1920px;
				height: 1080px;
				background:
					radial-gradient(
						ellipse at center,
						#3a0a14 0%,
						#1a0508 45%,
						#08020a 100%
					);
			}
			#root::before {
				content: "";
				position: absolute;
				inset: 0;
				background-image:
					radial-gradient(rgba(255, 255, 255, 0.045) 2px, transparent 2px),
					radial-gradient(rgba(255, 43, 58, 0.06) 1px, transparent 1px);
				background-size: 22px 22px, 13px 13px;
				background-position: 0 0, 7px 11px;
				pointer-events: none;
			}
			.brand-plate {
				position: absolute;
				top: 80px;
				left: 80px;
				display: flex;
				gap: 12px;
				font-family: "Inter", sans-serif;
				font-weight: 900;
				font-size: 36px;
				letter-spacing: 4px;
			}
			.brand-plate .ep {
				background: #ff2b3a;
				color: #fff;
				padding: 8px 18px;
				border-radius: 4px;
			}
			.brand-plate .channel {
				color: #fff;
				border: 3px solid #fff;
				padding: 8px 18px;
				border-radius: 4px;
			}
			.mega {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-family: "Bangers", "Anton", sans-serif;
				font-size: 380px;
				font-weight: 900;
				color: #fff;
				letter-spacing: 6px;
				line-height: 0.9;
				text-shadow:
					0 0 24px rgba(255, 43, 58, 0.55),
					12px 0 0 rgba(255, 43, 58, 0.7),
					-12px 0 0 rgba(34, 200, 230, 0.55);
				white-space: nowrap;
			}
			.sub {
				position: absolute;
				bottom: 120px;
				left: 50%;
				transform: translateX(-50%);
				font-family: "Inter", sans-serif;
				font-weight: 700;
				font-size: 56px;
				color: #ffd166;
				letter-spacing: 4px;
				text-transform: uppercase;
			}
			.corner {
				position: absolute;
				right: 80px;
				bottom: 80px;
				font-family: "Anton", sans-serif;
				font-size: 240px;
				color: #ffd166;
				line-height: 1;
				opacity: 0.92;
			}
			#flash {
				position: absolute;
				inset: 0;
				background: #fff;
				opacity: 0;
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div
			id="root"
			data-composition-id="comic-facts"
			data-width="1920"
			data-height="1080"
			data-start="0"
			data-duration="15"
		>
			<div class="brand-plate">
				<span class="ep">EPISODE 01</span>
				<span class="channel">YOUR CHANNEL</span>
			</div>
			<div class="mega" id="mega">365 DAYS</div>
			<div class="sub" id="sub">OF COMIC FACTS</div>
			<div class="corner" id="corner">01</div>
			<div id="flash"></div>
		</div>

		<script>
			window.__timelines = window.__timelines || {};
			const tl = gsap.timeline({ paused: true });
			window.__timelines["comic-facts"] = tl;

			tl.from(".brand-plate", { y: -40, opacity: 0, duration: 0.5, ease: "back.out(2)" }, 0)
				.from("#mega", { scale: 0.3, opacity: 0, duration: 0.7, ease: "back.out(2.2)" }, 0.2)
				.to("#flash", { opacity: 0.85, duration: 0.05 }, 0.2)
				.to("#flash", { opacity: 0, duration: 0.25 }, 0.25)
				.from("#sub", { y: 30, opacity: 0, duration: 0.5 }, 0.9)
				.from("#corner", { scale: 0, rotation: -20, opacity: 0, duration: 0.6, ease: "back.out(2)" }, 1.2)
				.to("#mega", { scale: 1.06, duration: 4, yoyo: true, repeat: 2, ease: "sine.inOut" }, 1.5);
		</script>
	</body>
</html>
