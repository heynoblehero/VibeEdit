<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1080, height=1920" />
		<title>Scary story Short</title>
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;700&display=block"
			rel="stylesheet"
		/>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { width: 1080px; height: 1920px; overflow: hidden; background: #050308; }
			#root {
				position: relative;
				width: 1080px;
				height: 1920px;
				background: radial-gradient(
					ellipse at 50% 80%,
					#1a0d2a 0%,
					#0a0312 60%,
					#020005 100%
				);
				font-family: "Cormorant Garamond", serif;
				color: #d6c8ee;
			}
			.kicker {
				position: absolute;
				top: 260px;
				left: 50%;
				transform: translateX(-50%);
				font-size: 50px;
				font-style: italic;
				color: #7c4ddf;
				letter-spacing: 4px;
			}
			.title {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-weight: 700;
				font-size: 180px;
				letter-spacing: 8px;
				text-align: center;
				line-height: 1.05;
			}
			.foot {
				position: absolute;
				bottom: 220px;
				left: 50%;
				transform: translateX(-50%);
				font-size: 38px;
				font-style: italic;
				color: #7c4ddf;
				opacity: 0.85;
			}
			.flicker {
				position: absolute;
				inset: 0;
				background: radial-gradient(
					ellipse at 50% 50%,
					transparent 30%,
					rgba(124, 77, 223, 0.15) 100%
				);
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div
			id="root"
			data-composition-id="scary-short"
			data-width="1080"
			data-height="1920"
			data-start="0"
			data-duration="30"
		>
			<div class="kicker" id="kicker">case file no. 31</div>
			<div class="title" id="title">THE BASEMENT TAPE</div>
			<div class="foot" id="foot">~ true story ~</div>
			<div class="flicker" id="flicker"></div>
		</div>

		<script>
			window.__timelines = window.__timelines || {};
			const tl = gsap.timeline({ paused: true });
			window.__timelines["scary-short"] = tl;

			tl.from("#kicker", { opacity: 0, duration: 1.4 }, 0)
				.from("#title", { opacity: 0, letterSpacing: "30px", duration: 2.2, ease: "power2.out" }, 0.8)
				.from("#foot", { opacity: 0, duration: 1.6 }, 2.4)
				.to("#title", { opacity: 0.85, duration: 1.6, yoyo: true, repeat: 6, ease: "sine.inOut" }, 4)
				.to("#flicker", { opacity: 0.4, duration: 0.4, yoyo: true, repeat: 50, ease: "sine.inOut" }, 0);
		</script>
	</body>
</html>
