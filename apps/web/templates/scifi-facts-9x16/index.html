<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1080, height=1920" />
		<title>Sci-fi hook</title>
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@500;700&display=block"
			rel="stylesheet"
		/>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { width: 1080px; height: 1920px; overflow: hidden; background: #02050a; }
			#root {
				position: relative;
				width: 1080px;
				height: 1920px;
				background:
					radial-gradient(
						ellipse at 50% 60%,
						#082638 0%,
						#03101a 60%,
						#000509 100%
					);
				font-family: "Inter", sans-serif;
				color: #d3f5ff;
			}
			.grid {
				position: absolute;
				inset: 0;
				background-image:
					linear-gradient(rgba(56, 225, 255, 0.06) 1px, transparent 1px),
					linear-gradient(90deg, rgba(56, 225, 255, 0.06) 1px, transparent 1px);
				background-size: 80px 80px;
				pointer-events: none;
				mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
			}
			.tag {
				position: absolute;
				top: 280px;
				left: 50%;
				transform: translateX(-50%);
				font-family: "JetBrains Mono", monospace;
				font-size: 46px;
				color: #38e1ff;
				letter-spacing: 6px;
				text-transform: uppercase;
				white-space: nowrap;
			}
			.title {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-weight: 900;
				font-size: 220px;
				color: #fff;
				letter-spacing: -2px;
				line-height: 0.95;
				text-align: center;
				width: 980px;
				text-shadow:
					0 0 30px rgba(56, 225, 255, 0.45);
			}
			.title span.glow {
				color: #38e1ff;
				display: block;
				font-size: 280px;
			}
			.foot {
				position: absolute;
				bottom: 280px;
				left: 50%;
				transform: translateX(-50%);
				font-family: "JetBrains Mono", monospace;
				font-size: 38px;
				color: #d3f5ff;
				opacity: 0.7;
				letter-spacing: 3px;
				white-space: nowrap;
			}
			.scan {
				position: absolute;
				inset: 0;
				background:
					repeating-linear-gradient(
						0deg,
						transparent 0,
						transparent 4px,
						rgba(56, 225, 255, 0.04) 4px,
						rgba(56, 225, 255, 0.04) 5px
					);
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div
			id="root"
			data-composition-id="scifi-facts"
			data-width="1080"
			data-height="1920"
			data-start="0"
			data-duration="30"
		>
			<div class="grid"></div>
			<div class="tag" id="tag">// DEEP SPACE LOG</div>
			<div class="title">
				<span>FILE</span>
				<span class="glow" id="glow">0427</span>
				<span>DECLASSIFIED</span>
			</div>
			<div class="foot" id="foot">~ proceed at your own risk ~</div>
			<div class="scan"></div>
		</div>

		<script>
			window.__timelines = window.__timelines || {};
			const tl = gsap.timeline({ paused: true });
			window.__timelines["scifi-facts"] = tl;

			tl.from("#tag", { y: -20, opacity: 0, duration: 0.6 }, 0)
				.from(".title span:nth-child(1)", { x: -60, opacity: 0, duration: 0.5 }, 0.3)
				.from("#glow", { scale: 0.5, opacity: 0, duration: 0.7, ease: "back.out(2)" }, 0.6)
				.from(".title span:nth-child(3)", { x: 60, opacity: 0, duration: 0.5 }, 1.0)
				.from("#foot", { opacity: 0, duration: 0.7 }, 1.4)
				.to("#glow", { opacity: 0.65, duration: 1.5, yoyo: true, repeat: 8, ease: "sine.inOut" }, 1.8);
		</script>
	</body>
</html>
