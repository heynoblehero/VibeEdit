<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=1080, height=1920" />
		<title>Tech intro</title>
		<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@900&display=block"
			rel="stylesheet"
		/>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0b0f14; }
			#root {
				position: relative;
				width: 1080px;
				height: 1920px;
				background:
					linear-gradient(180deg, #131820 0%, #07090d 100%);
				font-family: "Inter", sans-serif;
				color: #e8e8ee;
			}
			.grid {
				position: absolute;
				inset: 0;
				background-image:
					linear-gradient(rgba(34, 211, 238, 0.08) 1px, transparent 1px),
					linear-gradient(90deg, rgba(34, 211, 238, 0.08) 1px, transparent 1px);
				background-size: 80px 80px;
				pointer-events: none;
			}
			.prompt {
				position: absolute;
				top: 300px;
				left: 50%;
				transform: translateX(-50%);
				font-family: "JetBrains Mono", monospace;
				font-size: 56px;
				color: #22d3ee;
				letter-spacing: 2px;
			}
			.channel {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-weight: 900;
				font-size: 280px;
				color: #fff;
				letter-spacing: -4px;
				line-height: 1;
				text-align: center;
			}
			.tag {
				position: absolute;
				bottom: 320px;
				left: 50%;
				transform: translateX(-50%);
				font-family: "JetBrains Mono", monospace;
				font-size: 38px;
				color: #9999a8;
				letter-spacing: 3px;
			}
			.cursor {
				display: inline-block;
				width: 0.55em;
				height: 1em;
				background: #22d3ee;
				vertical-align: -0.1em;
			}
		</style>
	</head>
	<body>
		<div
			id="root"
			data-composition-id="tech-intro"
			data-width="1080"
			data-height="1920"
			data-start="0"
			data-duration="10"
		>
			<div class="prompt" id="prompt">$ ./build<span class="cursor" id="cursor"></span></div>
			<div class="channel" id="channel">devloop</div>
			<div class="tag" id="tag">// today: rust + bun + edge</div>
			<div class="grid"></div>
		</div>

		<script>
			window.__timelines = window.__timelines || {};
			const tl = gsap.timeline({ paused: true });
			window.__timelines["tech-intro"] = tl;

			tl.from("#prompt", { y: -20, opacity: 0, duration: 0.6 }, 0)
				.to("#cursor", { opacity: 0, duration: 0.5, yoyo: true, repeat: 16, ease: "steps(1)" }, 0)
				.from("#channel", { scale: 0.6, opacity: 0, duration: 0.7, ease: "back.out(1.8)" }, 0.6)
				.from("#tag", { opacity: 0, y: 30, duration: 0.5 }, 1.4);
		</script>
	</body>
</html>
