services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - vibeedit-data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/vibeedit.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN:-}
      - POLAR_ORGANIZATION_ID=${POLAR_ORGANIZATION_ID:-}
      - POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET:-}
      - POLAR_PRODUCT_STARTER=${POLAR_PRODUCT_STARTER:-}
      - POLAR_PRODUCT_PRO=${POLAR_PRODUCT_PRO:-}
      - POLAR_PRODUCT_STUDIO=${POLAR_PRODUCT_STUDIO:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@vibeedit.app}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    restart: unless-stopped

volumes:
  vibeedit-data:
