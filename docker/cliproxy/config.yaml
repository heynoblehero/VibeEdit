host: ""
port: 8317
tls:
  enable: false
remote-management:
  allow-remote: true
  secret-key: "vibeedit-mgmt-2026"
  disable-control-panel: false
  disable-auto-update-panel: false
auth-dir: "/root/.cli-proxy-api"
api-keys:
  - "vibeedit-internal"
debug: false
usage-statistics-enabled: true
request-retry: 3

# Map short Anthropic aliases VibeEdit uses to the cliproxy-known
# fully-qualified model IDs. fork: true keeps the original name valid too.
oauth-model-alias:
  claude:
    - name: "claude-sonnet-4-5-20250929"
      alias: "claude-sonnet-4-5"
      fork: true
    - name: "claude-opus-4-5-20251101"
      alias: "claude-opus-4-5"
      fork: true
    - name: "claude-haiku-4-5-20251001"
      alias: "claude-haiku-4-5"
      fork: true
