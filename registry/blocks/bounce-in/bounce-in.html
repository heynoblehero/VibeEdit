<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@700&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.5"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: linear-gradient(160deg, #22d3ee 0%, #3b82f6 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "Fredoka", sans-serif;
        }
        .bounce {
          font-size: 260px;
          font-weight: 700;
          color: #fff;
          text-shadow: 0 14px 0 rgba(0, 0, 0, 0.12);
          transform-origin: 50% 100%;
          will-change: transform, opacity;
        }
      </style>
      <div class="bounce">Yay!</div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const bounce = root.querySelector(".bounce");
          const tl = gsap.timeline({ paused: true });
          // Drop in from above and land, then a squash-and-stretch settle on the
          // bottom anchor — the classic cartoon bounce.
          tl.from(bounce, { y: -700, opacity: 0, duration: 0.5, ease: "power2.in" })
            .to(bounce, { scaleY: 0.72, scaleX: 1.16, duration: 0.1, ease: "power2.out" })
            .to(bounce, { scaleY: 1.12, scaleX: 0.92, duration: 0.12, ease: "power1.inOut" })
            .to(bounce, { scaleY: 0.94, scaleX: 1.05, duration: 0.1 })
            .to(bounce, { scaleY: 1, scaleX: 1, duration: 0.5, ease: "elastic.out(1, 0.4)" })
            .to({}, { duration: 0.9 });
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
