<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: radial-gradient(circle at 50% 45%, #14243b 0%, #060b14 72%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: "Inter", sans-serif;
        }
        .num {
          font-size: 340px;
          font-weight: 900;
          line-height: 1;
          letter-spacing: -6px;
          background: linear-gradient(180deg, #7dd3fc 0%, #3b82f6 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          font-variant-numeric: tabular-nums;
          will-change: transform, opacity;
        }
        .label {
          margin-top: 12px;
          font-size: 64px;
          font-weight: 700;
          letter-spacing: 6px;
          text-transform: uppercase;
          color: #94a3b8;
          will-change: transform, opacity;
        }
      </style>
      <div class="num">0</div>
      <div class="label">Downloads</div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const num = root.querySelector(".num");
          const label = root.querySelector(".label");
          const target = 128459;
          const counter = { value: 0 };
          const tl = gsap.timeline({ paused: true });
          // Pop the number in, ramp the value up on an ease (fast then settling),
          // and fade the label up beneath it.
          tl.from(num, { scale: 0.6, opacity: 0, duration: 0.4, ease: "back.out(2)" })
            .to(
              counter,
              {
                value: target,
                duration: 1.8,
                ease: "power2.out",
                onUpdate: () => {
                  num.textContent = Math.round(counter.value).toLocaleString("en-US");
                },
              },
              0.15,
            )
            .from(label, { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.4)
            .to({}, { duration: 0.5 });
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
