<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: radial-gradient(circle at 50% 45%, #14243b 0%, #060b14 72%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          font-family: "Inter", sans-serif;
        }
        /* Odometer: every digit is a vertical reel moved by translateY only, so
           the counter renders correctly under the engine's (event-suppressing)
           seek — no onUpdate/text-writing callbacks, which seeking skips. */
        .row {
          display: flex;
          align-items: center;
          font-weight: 900;
          font-size: 300px;
          line-height: 300px;
          letter-spacing: -4px;
          font-variant-numeric: tabular-nums;
        }
        .col {
          height: 300px;
          overflow: hidden;
        }
        .reel {
          will-change: transform;
        }
        .d {
          height: 300px;
          text-align: center;
          background: linear-gradient(180deg, #7dd3fc 0%, #3b82f6 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
        .comma {
          color: #3b82f6;
          padding: 0 10px;
        }
        .label {
          margin-top: 24px;
          font-size: 64px;
          font-weight: 700;
          letter-spacing: 6px;
          text-transform: uppercase;
          color: #94a3b8;
          will-change: transform, opacity;
        }
      </style>
      <div class="row"></div>
      <div class="label">Downloads</div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const row = root.querySelector(".row");
          const label = root.querySelector(".label");
          const target = "128,459";
          const H = 300; // px per digit — matches .col / .d height
          const SPINS = 3; // full 0-9 cycles before landing (the roll)

          const reels = [];
          for (const ch of target) {
            if (ch === ",") {
              const sep = document.createElement("div");
              sep.className = "comma";
              sep.textContent = ",";
              row.appendChild(sep);
              continue;
            }
            const col = document.createElement("div");
            col.className = "col";
            const reel = document.createElement("div");
            reel.className = "reel";
            // 0-9 repeated so the reel is long enough to spin SPINS times and land.
            let markup = "";
            for (let cycle = 0; cycle <= SPINS; cycle++) {
              for (let digit = 0; digit < 10; digit++) markup += '<div class="d">' + digit + "</div>";
            }
            reel.innerHTML = markup;
            col.appendChild(reel);
            row.appendChild(col);
            reels.push({ reel, digit: Number(ch) });
          }

          const tl = gsap.timeline({ paused: true });
          reels.forEach((entry, index) => {
            const landing = SPINS * 10 + entry.digit; // index of the final digit
            tl.fromTo(
              entry.reel,
              { y: 0 },
              { y: -landing * H, duration: 1.5 + index * 0.14, ease: "power3.out" },
              0,
            );
          });
          tl.from(label, { y: 24, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.5).to(
            {},
            { duration: 0.5 },
          );
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
