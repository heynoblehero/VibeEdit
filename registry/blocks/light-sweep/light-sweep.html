<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anton&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.5"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: linear-gradient(160deg, #101418 0%, #05070a 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "Anton", sans-serif;
        }
        /* Metallic base gradient with a bright specular band; the band's
           position is swept across the glyphs via background-position. */
        .sweep {
          font-size: 260px;
          letter-spacing: 6px;
          text-transform: uppercase;
          background: linear-gradient(
            100deg,
            #6b7280 0%,
            #9ca3af 38%,
            #ffffff 48%,
            #f8fafc 52%,
            #9ca3af 62%,
            #6b7280 100%
          );
          background-size: 300% 100%;
          background-position: 100% 0;
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          will-change: background-position, opacity;
        }
      </style>
      <div class="sweep">PREMIUM</div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const sweep = root.querySelector(".sweep");
          const tl = gsap.timeline({ paused: true });
          // Fade up, hold, then drag the highlight band left-to-right and rest.
          tl.from(sweep, { opacity: 0, y: 24, duration: 0.5, ease: "power2.out" })
            .to(sweep, { backgroundPosition: "0% 0", duration: 1.1, ease: "power2.inOut" }, 0.7)
            .to({}, { duration: 0.5 });
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
