<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anton&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: #0b0b10;
          font-family: "Anton", sans-serif;
        }
        /* Slightly oversized stage so the shake never exposes an edge. */
        .stage {
          position: absolute;
          inset: -60px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: radial-gradient(circle at 50% 50%, #241422 0%, #0b0b10 70%);
          will-change: transform;
        }
        .hit {
          font-size: 300px;
          letter-spacing: 6px;
          text-transform: uppercase;
          color: #ff5a3c;
          text-shadow: 0 0 40px rgba(255, 90, 60, 0.5);
          will-change: transform;
        }
        .flash {
          position: absolute;
          inset: 0;
          background: #fff;
          opacity: 0;
          pointer-events: none;
        }
      </style>
      <div class="stage">
        <div class="hit">BOOM</div>
      </div>
      <div class="flash"></div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const stage = root.querySelector(".stage");
          const hit = root.querySelector(".hit");
          const flash = root.querySelector(".flash");
          const tl = gsap.timeline({ paused: true });
          // Impact: scale-pop + white flash, then a decaying positional shake.
          const t = 0.35;
          tl.from(hit, { scale: 0.4, opacity: 0, duration: 0.3, ease: "back.out(2.2)" }, t - 0.3)
            .fromTo(flash, { opacity: 0.7 }, { opacity: 0, duration: 0.35, ease: "power2.out" }, t);
          // Hand-rolled decaying shake keyframes on the stage.
          const amps = [30, -24, 20, -16, 12, -9, 6, -4, 2];
          amps.forEach((a, index) => {
            tl.to(
              stage,
              {
                x: a,
                y: -a * 0.6,
                rotation: a * 0.05,
                duration: 0.05,
                ease: "none",
              },
              t + index * 0.05,
            );
          });
          tl.to(stage, { x: 0, y: 0, rotation: 0, duration: 0.08 }, t + amps.length * 0.05)
            .to({}, { duration: 0.7 });
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
