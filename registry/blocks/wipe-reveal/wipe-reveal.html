<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anton&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.5"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: #10121a;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "Anton", sans-serif;
        }
        .reveal {
          font-size: 300px;
          letter-spacing: 8px;
          text-transform: uppercase;
          color: #fff;
          will-change: transform, opacity;
        }
        .panel {
          position: absolute;
          inset: 0;
          transform-origin: left center;
          will-change: transform;
        }
        .p1 {
          background: #ff4d6d;
          z-index: 3;
        }
        .p2 {
          background: #ffd23f;
          z-index: 2;
        }
        .p3 {
          background: #10121a;
          z-index: 1;
        }
      </style>
      <div class="reveal">NEXT</div>
      <div class="panel p3"></div>
      <div class="panel p2"></div>
      <div class="panel p1"></div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const panels = root.querySelectorAll(".panel");
          const reveal = root.querySelector(".reveal");
          const tl = gsap.timeline({ paused: true });
          // Panels sweep in from the left (scaleX 0→1), pause, then clear off to
          // the right (translate), uncovering the title with a small settle.
          tl.set(panels, { scaleX: 0 })
            .set(reveal, { opacity: 0, scale: 1.15 })
            .to(panels, { scaleX: 1, duration: 0.4, ease: "power3.inOut", stagger: 0.09 })
            .set(reveal, { opacity: 1 })
            .to(
              panels,
              {
                xPercent: 105,
                duration: 0.5,
                ease: "power3.inOut",
                stagger: 0.08,
              },
              "+=0.15",
            )
            .to(reveal, { scale: 1, duration: 0.6, ease: "power2.out" }, "<")
            .to({}, { duration: 0.5 });
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
