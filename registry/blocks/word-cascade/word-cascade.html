<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anton&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: #f5c518;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "Anton", sans-serif;
        }
        .stack {
          text-align: center;
          line-height: 0.94;
        }
        .stack .word {
          display: block;
          font-size: 210px;
          letter-spacing: 4px;
          text-transform: uppercase;
          color: #101010;
          will-change: transform, opacity;
        }
        .stack .word.hl {
          color: #e5342a;
        }
      </style>
      <div class="stack">
        <span class="word">MADE</span>
        <span class="word hl">TO</span>
        <span class="word">MOVE</span>
      </div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const words = root.querySelectorAll(".stack .word");
          const tl = gsap.timeline({ paused: true });
          // Each word punches up from below with a back-ease overshoot, tightly
          // staggered — the signature kinetic-typography beat.
          tl.from(words, {
            yPercent: 120,
            opacity: 0,
            duration: 0.5,
            ease: "back.out(1.9)",
            stagger: 0.16,
          }).to({}, { duration: 1.4 });
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
