<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Anton&display=block");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="2.5"
      data-width="1920"
      data-height="1080"
    >
      <style>
        [data-composition-id="main"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          position: relative;
          background: radial-gradient(circle at 50% 42%, #1a1a2e 0%, #08080f 70%);
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: "Anton", sans-serif;
        }
        .zp-title {
          font-size: 280px;
          line-height: 0.9;
          color: #ffffff;
          letter-spacing: 6px;
          text-transform: uppercase;
          text-align: center;
          will-change: transform, filter, opacity;
          transform-origin: 50% 50%;
        }
        .zp-title span {
          display: inline-block;
          background: linear-gradient(180deg, #ffffff 0%, #b8c0ff 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
        }
      </style>
      <div class="zp-title"><span>PUNCH</span></div>

      <script>
        (function () {
          const root = document.querySelector('[data-composition-id="main"]');
          const title = root.querySelector(".zp-title");
          const tl = gsap.timeline({ paused: true });
          // Hard slam-in from an oversized, motion-blurred scale, then a quick
          // overshoot and settle — the classic beat-synced title punch.
          tl.from(title, {
            scale: 4,
            opacity: 0,
            filter: "blur(40px)",
            duration: 0.5,
            ease: "power4.out",
          })
            .to(title, { scale: 1.08, duration: 0.45, ease: "power1.inOut" }, ">")
            .to(title, { scale: 1, duration: 0.5, ease: "power2.out" })
            .to(title, { opacity: 1, duration: 0.55 }, "<");
          window.__timelines = window.__timelines || {};
          window.__timelines["main"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
